name: Build and Release

on:
  push:
    tags:
      - 'v*'   # 推送 v2.1.0 這類 tag 時觸發

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: 安裝 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安裝 Python 3.11 (node-gyp 需要)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 從 tag 設定版本號
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.version='$VERSION';fs.writeFileSync('package.json',JSON.stringify(p,null,2))"
        shell: bash

      - name: 還原 credentials.json
        run: echo '${{ secrets.CREDENTIALS_JSON }}' > credentials.json
        shell: bash

      - name: 快取 Electron 下載
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\electron\Cache
          key: electron-${{ runner.os }}-${{ hashFiles('package.json') }}

      - name: 安裝套件
        run: npm install
        env:
          GYP_MSVS_VERSION: 2022

      - name: 打包 Windows 安裝檔
        run: npx electron-builder --win --publish never

      - name: 上傳產物
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist/*.exe
            dist/latest.yml

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安裝 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安裝 Python 3.11 (node-gyp 需要)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 從 tag 設定版本號
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.version='$VERSION';fs.writeFileSync('package.json',JSON.stringify(p,null,2))"

      - name: 還原 credentials.json
        run: echo '${{ secrets.CREDENTIALS_JSON }}' > credentials.json

      - name: 快取 Electron 下載
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron
          key: electron-${{ runner.os }}-${{ hashFiles('package.json') }}

      - name: 安裝套件
        run: npm install

      - name: 打包 Mac 安裝檔
        run: npx electron-builder --mac --publish never

      - name: 上傳產物
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: |
            dist/*.dmg
            dist/latest-mac.yml

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 下載 Windows 產物
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: dist/win

      - name: 下載 Mac 產物
        uses: actions/download-artifact@v4
        with:
          name: mac-installer
          path: dist/mac

      - name: 發布 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/win/*.exe
            dist/win/latest.yml
            dist/mac/*.dmg
            dist/mac/latest-mac.yml
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
